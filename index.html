<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador de Contraseña</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Crea tu contraseña</h2>
        <input type="password" id="password" placeholder="Escribe aquí...">

        <div class="strength-bar-container">
            <div id="strength-bar"></div>
        </div>

        <ul class="requirements">
            <li id="length">Mínimo 8 caracteres</li>
            <li id="uppercase">1 Mayúscula</li>
            <li id="lowercase">1 Minúscula</li>
            <li id="number">1 Número</li>
            <li id="special">1 Carácter especial</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
